<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gamin Time Games CDN</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b14;
      --surface: #0f1726;
      --surface-strong: #121b2e;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.16);
      --accent: #38bdf8;
      --accent-hover: #7dd3fc;
      --card-shadow: 0 18px 50px rgba(15, 23, 42, 0.24);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.12), transparent 24%),
        linear-gradient(180deg, #020617, #08111f 45%, #0b1320 100%);
      color: var(--text);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      width: 100%;
      padding: 16px 24px;
      background: rgba(7, 11, 20, 0.96);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .brand span {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, #38bdf8, #60a5fa);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.26);
    }

    .repo-link {
      font-size: 0.95rem;
      color: var(--accent);
      border: 1px solid rgba(56, 189, 248, 0.2);
      padding: 10px 14px;
      border-radius: 999px;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .repo-link:hover {
      background: rgba(56, 189, 248, 0.12);
      transform: translateY(-1px);
    }

    .container {
      width: min(1280px, calc(100% - 40px));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .hero {
      padding: 28px 0 20px;
      display: grid;
      gap: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.3rem, 3vw, 3.6rem);
      line-height: 1.02;
    }

    .hero p {
      margin: 0;
      max-width: 720px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
    }

    .search-group {
      flex: 1 1 320px;
      position: relative;
    }

    .search-group input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 18px;
      background: rgba(15, 23, 38, 0.92);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .search-group input:focus {
      border-color: var(--accent);
    }

    .stats {
      min-width: 160px;
      padding: 14px 18px;
      border-radius: 16px;
      background: rgba(15, 23, 38, 0.94);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .card {
      display: block;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(15, 23, 38, 0.92), rgba(7, 11, 20, 0.98));
      border: 1px solid rgba(148, 163, 184, 0.08);
      box-shadow: var(--card-shadow);
      transition: transform 0.22s ease, border-color 0.22s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(56, 189, 248, 0.22);
    }

    .card-image {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: rgba(15, 23, 38, 0.9);
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.05);
      transition: transform 0.3s ease;
    }

    .card:hover .card-image img {
      transform: scale(1.03);
    }

    .card-body {
      padding: 16px 16px 20px;
      display: grid;
      gap: 10px;
    }

    .card-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .card-action {
      padding: 12px 14px;
      background: rgba(56, 189, 248, 0.14);
      color: var(--accent);
      text-align: center;
      font-weight: 700;
      border-radius: 14px;
      border: 1px solid transparent;
      transition: background 0.18s ease, border-color 0.18s ease;
    }

    .card:hover .card-action {
      background: rgba(56, 189, 248, 0.22);
      border-color: rgba(56, 189, 248, 0.28);
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 36px 24px;
      text-align: center;
      background: rgba(15, 23, 38, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 22px;
      color: var(--muted);
      font-size: 1rem;
    }

    @media (max-width: 640px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      .repo-link {
        width: 100%;
        text-align: center;
      }
      .hero {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span></span>
      <div>
        <div>Gamin Time Games</div>
        <div style="font-size:0.85rem; color: var(--muted);">Games CDN browser</div>
      </div>
    </div>

    <a class="repo-link" href="https://github.com/KingZander91/Gamin-time-Games-CDN/tree/main" target="_blank" rel="noreferrer noopener">
      Github Repo
    </a>
  </header>

  <main class="container">
    <section class="hero">
      <div>
        <h1>Browse the games catalog</h1>
        <p>Explore the full `games.json` catalogue with image previews and launch links. Search by game name or ID instantly.</p>
      </div>
      <div class="controls">
        <label class="search-group">
          <input id="searchInput" type="search" placeholder="Search games by name or id..." aria-label="Search games" />
        </label>
        <div class="stats" id="gameCount">Loading games…</div>
      </div>
    </section>

    <section class="grid" id="gameGrid"></section>
  </main>

  <script>
    const repoUrl = 'https://github.com/KingZander91/Gamin-time-Games-CDN/tree/main';
    const gameGrid = document.getElementById('gameGrid');
    const gameCount = document.getElementById('gameCount');
    const searchInput = document.getElementById('searchInput');
    let games = [];

    const safeUrl = (value) => {
      try {
        return encodeURI(value.trim());
      } catch (err) {
        return value;
      }
    };

    const renderCards = (items) => {
      if (!items.length) {
        gameGrid.innerHTML = '<div class="empty-state">No games match your search. Try a different keyword.</div>';
        gameCount.textContent = '0 games';
        return;
      }

      gameCount.textContent = `${items.length.toLocaleString()} game${items.length === 1 ? '' : 's'}`;
      gameGrid.innerHTML = items
        .map((game) => {
          const imageSrc = safeUrl(game.game_image_icon || game.game_url);
          const gameUrl = safeUrl(game.game_url || '#');
          return `
            <a class="card" href="${gameUrl}" target="_blank" rel="noreferrer noopener">
              <div class="card-image">
                <img src="${imageSrc}" alt="${game.name} image" loading="lazy" />
              </div>
              <div class="card-body">
                <h2 class="card-title">${game.name}</h2>
                <div class="card-meta">
                  <span>${game['game-id'] || ''}</span>
                  <span class="card-action">Open game</span>
                </div>
              </div>
            </a>`;
        })
        .join('');
    };

    const filterGames = (query) => {
      const normalized = query.trim().toLowerCase();
      if (!normalized) {
        renderCards(games);
        return;
      }

      const filtered = games.filter((game) => {
        const title = (game.name || '').toLowerCase();
        const id = (game['game-id'] || '').toLowerCase();
        const url = (game.game_url || '').toLowerCase();
        return title.includes(normalized) || id.includes(normalized) || url.includes(normalized);
      });
      renderCards(filtered);
    };

    async function loadGames() {
      try {
        const response = await fetch('games.json');
        if (!response.ok) {
          throw new Error(`Failed to load games.json: ${response.status}`);
        }
        games = await response.json();
        renderCards(games);
      } catch (error) {
        gameGrid.innerHTML = `<div class="empty-state">Unable to load games.json. ${error.message}</div>`;
        gameCount.textContent = 'Load failed';
      }
    }

    searchInput.addEventListener('input', (event) => filterGames(event.target.value));
    loadGames();
  </script>
</body>
</html>
